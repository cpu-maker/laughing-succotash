<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="desktop">

  <!-- ICON -->
  <div class="icon" onclick="openApp('terminal')">
    🖥️<br>Terminal
  </div>

  <!-- WINDOW -->
  <div id="terminalWindow" class="window hidden">
    <div class="titlebar" onmousedown="dragStart(event, this.parentElement)">
      Terminal
      <span class="close" onclick="closeApp('terminal')">✕</span>
    </div>

    <div id="terminal">
      <div id="output"></div>
      <input id="input" autocomplete="off">
    </div>
  </div>

</div>

<!-- TASKBAR -->
<div id="taskbar">
  <div id="start">MyOS</div>
  <div id="taskTime"></div>
</div>

<script src="script.js"></script>
</body>
</html>
