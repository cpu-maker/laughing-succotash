<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="topbar">
    <div id="logo">MyOS</div>
    <div id="stats">
      <span id="cpu">CPU: --%</span>
      <span id="ram">RAM: --%</span>
      <span id="time"></span>
    </div>
  </div>

  <div id="desktop">
    <div id="terminal">
      <div id="output"></div>
      <input id="input" placeholder="type a command...">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
